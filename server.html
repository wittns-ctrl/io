<!DOCTYPE html>
<html>
<body>
  <ul id="messages"></ul>

  <input placeholder="username" id="user">
  <button onclick="register()">register</button>

  <input placeholder="roomname" id="room">
  <button onclick="room()">chat room</button>

  <form id="form">
    <input id="input" autocomplete="off" />
    <button>Send</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let counter = 0;
    const socket = io({
    auth: {
      serverOffset : 0
    },
    ackTimeout: 10000,
    retries: 3
    })

    const form = document.getElementById("form")
    const input = document.getElementById("input")
    const messages = document.getElementById("messages")

    let currentroom = null;
    let username = null;
    
    function room(){
      currentroom = document.getElementById("room").value
      socket.emit("chat room", currentroom)
    }

    function register(){
      username = document.getElementById("user").value
      socket.emit("username", username)
    }

    form.addEventListener("submit",(e)=>{
        e.preventDefault()

        if(!input.value) return;
        let clientOffset = `${socket.id}-${counter++}`

        if(input.value.startsWith('@')){
            const parts = input.value.split(' ')
            const to = parts[0].substring(1)
            const message = parts.slice(1).join(' ')          

            socket.emit("private message",{
              to,
              message,
              clientOffset
            })
        } else {
            socket.emit("group chat",{
              to: currentroom,
              message: input.value,
              clientOffset
            })
        }

        input.value = ""
    })

    socket.on("chat",(msg,serverOffset)=>{
      const item = document.createElement("li")
      item.textContent = msg     
      messages.appendChild(item)
      window.scrollTo(0,document.body.scrollHeight)

      socket.auth.serverOffset = serverOffset
    })
  </script>
</body>
</html>
